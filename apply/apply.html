<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>프런트엔드 개발자 지원서</title>
  <link rel="stylesheet" href="./css/apply.css">
</head>
<body>

  <div class="container">
    <h1>프런트엔드 개발자 지원서</h1>
    <p>HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.</p>
    <hr>

    <form>
      <!-- 개인정보 구역 -->
      <fieldset>
        <legend>개인정보</legend>
        <ul>
          <li>
            <label>이름</label>
            <input type="text" placeholder="공백없이 입력하세요">
          </li>
          <li>
            <label>연락처</label>
            <input type="text">
          </li>
        </ul>
      </fieldset>

      <!-- 지원 분야 구역 -->
      <fieldset>
        <legend>지원 분야</legend>
        <ul>
          <li><input type="radio" name="field"> 웹 퍼블리싱</li>
          <li><input type="radio" name="field"> 웹 애플리케이션 개발</li>
          <li><input type="radio" name="field"> 개발 환경 개선</li>
        </ul>
      </fieldset>

      <!-- 지원 동기 구역 -->
      <fieldset>
        <legend>지원 동기</legend>
        <textarea placeholder="본사 지원 동기를 간략히 써 주세요."></textarea>
      </fieldset>

      <div class="buttons">
        <button type="submit">접수하기</button>
        <button type="reset">다시 쓰기</button>
      </div>
    </form>
  </div>

</body>
</html>
